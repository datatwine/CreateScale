# =============================================================================
# Prometheus config — DB box local exporters only
# =============================================================================
# Web fleet metrics (web-fleet, node-web) arrive via remote_write from the
# Prometheus agent running inside k3s. This config only scrapes services
# that run locally on the DB box as Docker containers.
# =============================================================================

global:
  scrape_interval: 45s
  evaluation_interval: 45s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: 'docker-db'
    static_configs:
      - targets: ['docker_stats_exporter:9417']
