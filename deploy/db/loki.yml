auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /tmp/loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    # Pre-cutover data: stays on local filesystem
    # "from" = "use this config for data ingested starting this date"
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
    # Post-cutover data: goes directly to R2
    - from: 2026-07-15
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /tmp/loki/chunks
  aws:
    endpoint: ${R2_ENDPOINT}
    bucketnames: artkhoj-logs
    access_key_id: ${R2_ACCESS_KEY_ID}
    secret_access_key: ${R2_SECRET_ACCESS_KEY}
    s3forcepathstyle: true
    region: auto

# 256MB LRU cache — recent chunks served from memory, older from R2.
# When full, oldest entries evicted. Evicted data still in R2, just
# slightly slower to query. At scale, bump this or move to Redis cache.
chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 256
      ttl: 336h

# Deletes LOCAL pre-cutover filesystem chunks after 14 days.
# R2 data is not affected — lives forever.
limits_config:
  retention_period: 336h
