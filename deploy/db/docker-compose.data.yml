# =============================================================================
# DB Box — docker-compose.data.yml
# =============================================================================
# Runs on the dedicated AK-DB c7g.large instance.
# Houses: PostgreSQL, Redis, GlitchTip (error tracking).
# Observability services (Prometheus, Grafana, Loki) are added in Phase 6.
#
# USAGE:
#   cd ~/AK/deploy/db
#   docker compose -f docker-compose.data.yml up -d
#
# REQUIRES: .env file next to this file (never committed to repo).
#   See .env.example for required variables.
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-glitchtip-db.sh:/docker-entrypoint-initdb.d/init-glitchtip-db.sh:ro
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c listen_addresses='*'
        -c max_connections=200
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--bind", "0.0.0.0", "--protected-mode", "no"]
    ports:
      - "6379:6379"

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/glitchtip
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY}"
      PORT: 8000
      GLITCHTIP_DOMAIN: "http://${DB_HOST_PUBLIC_IP}:8000"
      EMAIL_URL: "consolemail://"
      DEFAULT_FROM_EMAIL: "[email protected]"
    ports:
      - "8000:8000"
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/glitchtip
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY}"
      GLITCHTIP_DOMAIN: "http://${DB_HOST_PUBLIC_IP}:8000"
      EMAIL_URL: "consolemail://"
      DEFAULT_FROM_EMAIL: "[email protected]"
    command: ./bin/run-celery-with-beat.sh
    restart: unless-stopped

volumes:
  postgres_data:
