apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: artkhoj
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: beat
          image: ghcr.io/datatwine/createscale:latest
          command: ["python", "-m", "celery", "-A", "myproject", "beat", "-l", "info"]
          envFrom:
            - secretRef:
                name: artkhoj-env
