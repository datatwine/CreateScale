# COMMITTED as a reference (like deploy/web/.env.example). The REAL secret is
# NEVER committed — on the cluster you create it from a gitignored env file:
#   kubectl -n artkhoj create secret generic artkhoj-env --from-env-file=.env.hetzner
apiVersion: v1
kind: Secret
metadata:
  name: artkhoj-env
  namespace: artkhoj
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "CHANGE_ME"
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: "stagefreedom.org"
  CSRF_TRUSTED_ORIGINS: "https://stagefreedom.org"
  ENVIRONMENT: "production"
  DB_HOST: "CHANGE_ME_DB_PRIVATE_IP"
  DB_PORT: "6432"
  DB_NAME: "createscale"
  DB_USER: "createscale"
  DB_PASSWORD: "CHANGE_ME"
  REDIS_URL: "redis://CHANGE_ME_DB_PRIVATE_IP:6379/1"
  AWS_ACCESS_KEY_ID: "CHANGE_ME_R2_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME_R2_SECRET_KEY"
  USE_S3: "1"
  AWS_STORAGE_BUCKET_NAME: "artkhoj-media"
  AWS_S3_REGION_NAME: "auto"
  AWS_S3_ENDPOINT_URL: "https://CHANGE_ME_CF_ACCOUNT_ID.r2.cloudflarestorage.com"
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
  TWITTER_CLIENT_ID: "CHANGE_ME"
  TWITTER_CLIENT_SECRET: "CHANGE_ME"
  LINKEDIN_CLIENT_ID: "CHANGE_ME"
  LINKEDIN_CLIENT_SECRET: "CHANGE_ME"
  SENTRY_DSN: "http://CHANGE_ME_DSN_KEY@CHANGE_ME_DB_PRIVATE_IP:8000/1"
  WEB_CONCURRENCY: "9"
  WEB_THREADS: "2"
  WEB_TIMEOUT: "30"
