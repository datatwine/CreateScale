apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
  namespace: artkhoj
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: django
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: django
          image: ghcr.io/datatwine/createscale:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: artkhoj-env
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /metrics
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 15
