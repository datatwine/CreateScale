# DEV ONLY — throwaway Postgres + Redis for local k3d testing.
# NEVER applied in production (real DB lives on the DB box).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-postgres
  namespace: artkhoj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-postgres
  template:
    metadata:
      labels:
        app: dev-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: "createscale"
            - name: POSTGRES_USER
              value: "createscale"
            - name: POSTGRES_PASSWORD
              value: "devpassword"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: dev-postgres
  namespace: artkhoj
spec:
  selector:
    app: dev-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-redis
  namespace: artkhoj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-redis
  template:
    metadata:
      labels:
        app: dev-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: dev-redis
  namespace: artkhoj
spec:
  selector:
    app: dev-redis
  ports:
    - port: 6379
      targetPort: 6379
