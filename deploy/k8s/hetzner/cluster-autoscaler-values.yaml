# Helm values for Cluster Autoscaler (Hetzner driver).
# WARNING: Contains real API token — do NOT commit this file with real values.
# SCP to k3s node and use with: helm install -f this-file.yaml
cloudProvider: hetzner
extraEnv:
  HCLOUD_TOKEN: "9smw1djj8G5cEECo5deBWmDqSxyk40VyeE5b25nEN3Mo5ulqtNkohebUO7vrAgi7"
  HCLOUD_NETWORK: "artkhoj-net"
  HCLOUD_FIREWALL: "artkhoj-fw"
  HCLOUD_SSH_KEY: "artkhoj-key"
  HCLOUD_CLUSTER_CONFIG: ""
extraArgs:
  scale-down-unneeded-time: 20m
  scale-down-delay-after-add: 15m
  scale-down-delay-after-delete: 5m
  scale-down-utilization-threshold: "0.15"
autoscalingGroups:
  - name: web-pool
    minSize: 1
    maxSize: 15
    instanceType: cpx22
    region: sin
