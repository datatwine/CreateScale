# =============================================================================
# Promtail config — Ships logs from web instances to central Loki
# =============================================================================
# Deployed to each web instance (OD + Spot).
# Reads Gunicorn/Django stdout logs from Docker and ships them to Loki
# running on the DB box.
#
# NOTE: Replace <AK-DB-PRIVATE-IP> with the actual private IP of the DB box.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  # Loki is running on the DB box, port 3100
  - url: http://<AK-DB-PRIVATE-IP>:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets: ['localhost']
        labels:
          job: web
          __path__: /var/log/*.log
