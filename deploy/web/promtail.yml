# =============================================================================
# Promtail config — Ships logs from web instances to central Loki
# =============================================================================
# Deployed to each web instance (OD + Spot).
# Uses Docker service discovery to find the web container and ship its logs
# to Loki running on the DB box (172.31.6.148).
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://172.31.6.148:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: 'web'
        action: keep
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
