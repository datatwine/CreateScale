# =============================================================================
# Web Instance — docker-compose.web.yml
# =============================================================================
# Runs on both the OD Web instance and Spot instances.
# Contains the Django/Gunicorn app container + Promtail log shipper.
# Pulls a pre-built ARM64 image from GHCR (built by CI/CD).
#
# USAGE:
#   cd ~/AK-WEB
#   docker compose -f docker-compose.web.yml up -d
#
# REQUIRES: .env file next to this file (never committed to repo).
#   See .env.example for required variables.
# =============================================================================

services:
  web:
    image: ghcr.io/datatwine/createscale:latest
    restart: unless-stopped
    user: "0:0"
    env_file:
      - .env
    environment:
      WEB_CONCURRENCY: "9"
      WEB_CONN: "1000"
      WEB_TIMEOUT: "30"
    ports:
      - "8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Celery worker ----
  # Processes background tasks: video compression, payment expiry, payout release.
  # Runs on ALL web instances (OD + Spot). Tasks are distributed via Redis queue.
  worker:
    image: ghcr.io/datatwine/createscale:latest
    restart: unless-stopped
    user: "0:0"
    env_file:
      - .env
    command: celery -A myproject worker -l info --concurrency=2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Celery beat (OD only) ----
  # Periodic task scheduler. Must run on exactly ONE instance to avoid
  # duplicate task firing. Gated on RUN_BEAT env var (1 on OD, 0 on Spot).
  beat:
    image: ghcr.io/datatwine/createscale:latest
    restart: "no"
    user: "0:0"
    env_file:
      - .env
    command: >
      sh -c '
        if [ "$${RUN_BEAT:-0}" = "1" ]; then
          exec celery -A myproject beat -l info
        else
          echo "Beat disabled (RUN_BEAT!=1) — exiting."
        fi'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:2.9.0
    hostname: ${HOSTNAME:-ak-web}
    restart: unless-stopped
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml

  # ---- Node Exporter ----
  # Exposes host-level CPU/memory metrics on :9100 for Prometheus.
  # Needed because Gunicorn multiprocess mode disables Python's ProcessCollector,
  # so process_cpu_seconds_total and process_resident_memory_bytes don't exist.
  # node_exporter reads /proc and /sys from the HOST (read-only) instead.
  node_exporter:
    image: prom/node-exporter:v1.8.1
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.disable-defaults'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.loadavg'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  promtail_positions:
