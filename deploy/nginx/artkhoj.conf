# Auto-generated upstream — managed by /usr/local/bin/update_upstream.py
include /etc/nginx/upstream.conf;

log_format main_ext '$remote_addr - $remote_user [$time_iso8601] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time uaddr=$upstream_addr '
                    'reqlen=$request_length sent=$bytes_sent';

access_log /var/log/nginx/access.log main_ext;
error_log  /var/log/nginx/error.log warn;

# ---------------------------------------------------------------------------
# Restore real client IP from Cloudflare proxy
# Full list: https://www.cloudflare.com/ips-v4/ and /ips-v6/
# ---------------------------------------------------------------------------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ---------------------------------------------------------------------------
# Proxy cache zone for shared API responses (professions + live-events).
# 1 MB key zone ~ 8,000 keys. 10 MB disk. Entries expire after 10 min idle.
# ---------------------------------------------------------------------------
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:1m max_size=10m inactive=10m;

server {
    listen 80;
    server_name stagefreedom.org;

    # ---- Professions list (same for all users, changes rarely) ----
    location = /api/users/professions/ {
        proxy_cache            api_cache;
        proxy_cache_valid      200 5m;
        proxy_cache_key        "$request_uri";
        proxy_ignore_headers   Cache-Control;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://django_upstream;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ---- Live events (same for all users, 30s TTL) ----
    location = /api/users/live-events/ {
        proxy_cache            api_cache;
        proxy_cache_valid      200 30s;
        proxy_cache_key        "$request_uri";
        proxy_ignore_headers   Cache-Control;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://django_upstream;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ---- Everything else (proxy to Django, no Nginx caching) ----
    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://django_upstream;
        client_max_body_size 25M;
        proxy_read_timeout 90s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 90s;
    }
}
