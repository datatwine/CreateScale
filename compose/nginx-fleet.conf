# =============================================================================
# Nginx Fleet Config — DNS-based round-robin across scaled web containers
# =============================================================================
# Used by fleet mode: docker compose -f docker-compose.yml -f docker-compose.fleet.yml up
#
# Key difference from compose/nginx.conf:
#   Instead of a static upstream block (which Nginx resolves once at startup),
#   we use Docker's embedded DNS resolver (127.0.0.11) with a variable-based
#   proxy_pass. This forces Nginx to re-resolve 'web' on every request,
#   picking up all container IPs from --scale web=3.
# =============================================================================

# Richer log format with timings and upstream info
log_format main_ext '$remote_addr - $remote_user [$time_iso8601] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time uaddr=$upstream_addr '
                    'reqlen=$request_length sent=$bytes_sent';

# Write access & error logs
access_log /var/log/nginx/access.log main_ext;
error_log  /var/log/nginx/error.log warn;

# Proxy cache for static API responses (professions list)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:1m max_size=10m inactive=10m;

server {
    listen 80;

    # Docker embedded DNS — re-resolves container IPs every 5s
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Static files
    location /static/ {
        alias /vol/static/;
        try_files $uri $uri/ =404;

        # Browser caching for hashed static assets
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Media uploads
    location /media/ {
        alias /vol/media/;
        try_files $uri $uri/ =404;
    }

    # Professions API — cached at Nginx level (static data, changes rarely)
    location = /api/users/professions/ {
        set $backend "http://web:8000";

        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$request_uri";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Proxy to Django fleet (Gunicorn) — round-robins across all web replicas
    location / {
        set $backend "http://web:8000";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $backend;
        client_max_body_size 25M;

        # Timeout settings for proxy
        proxy_read_timeout 90s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 90s;
    }
}
