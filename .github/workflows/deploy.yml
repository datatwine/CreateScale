# =============================================================================
# CI/CD Pipeline — CreateScale (Horizontal Scaling)
# =============================================================================
#
# WHAT THIS DOES:
#   Push to main OR open a PR → this pipeline runs automatically.
#   It runs up to 6 jobs:
#
#   1. GUARDRAILS   (~30s)  — linting + security scan (ruff + bandit)
#   2. BUILD        (~2m)   — Docker image compiles + Django config valid
#   3. TEST         (~2m)   — Layer 1 invariant tests with real Postgres
#   4. PUSH-IMAGE   (~3m)   — Build ARM64 image + push to GHCR
#                              (only on push to main)
#   5. DEPLOY-WEB   (~3m)   — Deploy to OD instance, then rolling restart
#                              of Spot fleet (only on push to main)
#   6. DEPLOY-DB    (~1m)   — Deploy DB box config changes
#                              (only when deploy/db/** files change)
#   7. DEPLOY-NGINX (~1m)   — Deploy Nginx config to web-od
#                              (only when deploy/nginx/** files change)
#
# REQUIRED GITHUB SECRETS:
#   AWS_ACCESS_KEY_ID        — IAM user access key (for SSM)
#   AWS_SECRET_ACCESS_KEY    — IAM user secret key (for SSM)
#   AWS_REGION               — EC2 region (ap-south-1)
#   EC2_WEB_OD_INSTANCE_ID   — OD Web instance ID (i-0abc...)
#   EC2_DB_INSTANCE_ID       — DB instance ID (i-0xyz...)
#   GHCR_PAT                 — GitHub PAT with read:packages scope
#                              (for Spot instances to pull images)
#
# REQUIRED REPO SETTINGS:
#   Settings → Actions → General → Workflow permissions →
#     "Read and write permissions" (for GITHUB_TOKEN to push to GHCR)
#
# =============================================================================

name: CI/CD Pipeline

# --- TRIGGER ---
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ===========================================================================
  # JOB 1: GUARDRAILS
  # ===========================================================================
  guardrails:
    name: "🛡️ Guardrails (lint + security)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff bandit

      - name: "Ruff — lint check"
        run: ruff check .

      - name: "Bandit — security scan"
        run: bandit -r . -x ./tests -ll

  # ===========================================================================
  # JOB 2: BUILD
  # ===========================================================================
  build:
    name: "🔨 Build + Django health"
    needs: guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Docker Compose — build all custom images"
        run: docker compose build

  # ===========================================================================
  # JOB 3: TESTS
  # ===========================================================================
  test:
    name: "🧪 Layer 1 tests"
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django

      - name: "Migrations up to date?"
        env:
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: "5432"
          DJANGO_SECRET_KEY: "ci-test-secret-not-for-production-x7k2m9p"
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: "localhost"
          USE_S3: "0"
        run: python manage.py makemigrations --check --dry-run

      - name: "Run Layer 1 invariant tests"
        env:
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: "5432"
          DJANGO_SECRET_KEY: "ci-test-secret-not-for-production-x7k2m9p"
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: "localhost"
          USE_S3: "0"
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: myproject.settings
        run: pytest tests/test_layer1.py -v

  # ===========================================================================
  # JOB 4: BUILD ARM64 IMAGE + PUSH TO GHCR
  # ===========================================================================
  # Builds natively on an ARM runner (no QEMU emulation).
  # Pushes to GitHub Container Registry (free).
  # Only runs on push to main (not PRs).
  # ===========================================================================
  push-image:
    name: "📦 Build ARM64 + Push to GHCR"
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push ARM64 image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/createscale
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

  # ===========================================================================
  # JOB 5: DEPLOY TO WEB FLEET
  # ===========================================================================
  # Step A: Deploy to the OD Web instance first (canary).
  #         If the OD deploy fails, Spot fleet is NOT touched.
  # Step B: Rolling restart of all Spot instances, sequentially,
  #         with 30-second delays between each to allow Nginx failover.
  # ===========================================================================
  deploy-web:
    name: "🚀 Deploy Web Fleet"
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- Step A: Deploy to OD instance (canary) ---
      - name: "Deploy to OD Web Instance"
        id: od_deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_WEB_OD_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -eu",
              "cd /home/ubuntu/AK && git pull origin main",
              "cd /home/ubuntu/AK-WEB",
              "docker pull ghcr.io/${{ github.repository_owner }}/createscale:latest",
              "docker compose -f docker-compose.web.yml up -d --force-recreate",
              "echo OD_DEPLOY_COMPLETE"
            ]' \
            --timeout-seconds 120 \
            --query "Command.CommandId" \
            --output text)

          echo "OD Command: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: "Wait for OD deploy"
        run: |
          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.od_deploy.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_WEB_OD_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: Status = $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ OD deploy succeeded!"
              aws ssm get-command-invocation \
                --command-id "${{ steps.od_deploy.outputs.command_id }}" \
                --instance-id "${{ secrets.EC2_WEB_OD_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ OD deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "${{ steps.od_deploy.outputs.command_id }}" \
                --instance-id "${{ secrets.EC2_WEB_OD_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi

            sleep 10
          done
          echo "❌ OD deploy timed out"
          exit 1

      # --- Step B: Rolling restart Spot fleet ---
      - name: "Rolling restart Spot fleet"
        run: |
          # Find all running instances tagged Role=web, EXCLUDING the OD instance
          SPOT_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Role,Values=web" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[?InstanceId!=\`${{ secrets.EC2_WEB_OD_INSTANCE_ID }}\`].InstanceId" \
            --output text)

          if [ -z "$SPOT_IDS" ] || [ "$SPOT_IDS" = "None" ]; then
            echo "No Spot instances running — skipping rolling restart."
            exit 0
          fi

          echo "Spot instances to update: $SPOT_IDS"
          for INSTANCE_ID in $SPOT_IDS; do
            echo "--- Updating $INSTANCE_ID ---"
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=[
                "set -eu",
                "cd /home/ubuntu/AK-WEB",
                "docker pull ghcr.io/datatwine/createscale:latest",
                "docker compose -f docker-compose.web.yml up -d --force-recreate",
                "echo SPOT_DEPLOY_COMPLETE"
              ]' \
              --timeout-seconds 120
            echo "Waiting 30s before next instance (graceful rollout)..."
            sleep 30
          done
          echo "✅ Rolling restart complete."

  # ===========================================================================
  # JOB 6: DEPLOY DB BOX (only when deploy/db/** changes)
  # ===========================================================================
  # Triggers only when files in deploy/db/ are modified.
  # Runs git pull on the DB box and restarts services.
  # ===========================================================================
  deploy-db:
    name: "🗄️ Deploy DB Box"
    needs: test
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      contains(join(github.event.commits.*.modified, ','), 'deploy/db/')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: "Deploy to DB Box via SSM"
        id: db_deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_DB_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -eu",
              "cd /home/ubuntu/AK",
              "git pull origin main",
              "cd deploy/db",
              "docker compose -f docker-compose.data.yml build docker_stats_exporter",
              "docker compose -f docker-compose.data.yml up -d --remove-orphans",
              "echo DB_DEPLOY_COMPLETE"
            ]' \
            --timeout-seconds 180 \
            --query "Command.CommandId" \
            --output text)

          echo "DB Command: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: "Wait for DB deploy"
        run: |
          for i in $(seq 1 15); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.db_deploy.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_DB_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: Status = $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ DB deploy succeeded!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ DB deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "${{ steps.db_deploy.outputs.command_id }}" \
                --instance-id "${{ secrets.EC2_DB_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi

            sleep 12
          done
          echo "❌ DB deploy timed out"
          exit 1

  # ===========================================================================
  # JOB 7: DEPLOY NGINX CONFIG (only when deploy/nginx/** changes)
  # ===========================================================================
  # Triggers only when files in deploy/nginx/ are modified.
  # Pulls latest repo on web-od, copies configs to system paths, reloads Nginx.
  # ===========================================================================
  deploy-nginx:
    name: "🔀 Deploy Nginx Config"
    needs: test
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      contains(join(github.event.commits.*.modified, ','), 'deploy/nginx/')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: "Deploy Nginx config via SSM"
        id: nginx_deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_WEB_OD_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -eu",
              "cd /home/ubuntu/AK",
              "git pull origin main",
              "sudo cp deploy/nginx/artkhoj.conf /etc/nginx/sites-available/artkhoj",
              "sudo cp deploy/nginx/upstream.conf /etc/nginx/upstream.conf",
              "sudo cp deploy/nginx/update_upstream.py /usr/local/bin/update_upstream.py",
              "sudo chmod +x /usr/local/bin/update_upstream.py",
              "sudo cp deploy/nginx/nginx-discovery.service /etc/systemd/system/",
              "sudo nginx -t && sudo systemctl reload nginx",
              "sudo systemctl daemon-reload && sudo systemctl restart nginx-discovery",
              "docker pull quay.io/martinhelmich/prometheus-nginxlog-exporter:v1.11.0",
              "docker stop nginxlog_exporter || true",
              "docker rm nginxlog_exporter || true",
              "docker run -d --name nginxlog_exporter --restart unless-stopped -v /var/log/nginx:/var/log/nginx:ro -v /home/ubuntu/AK/deploy/nginx/nginxlog.yml:/config/nginxlog.yml:ro -p 4040:4040 quay.io/martinhelmich/prometheus-nginxlog-exporter:v1.11.0 --config-file /config/nginxlog.yml",
              "echo NGINX_DEPLOY_COMPLETE"
            ]' \
            --timeout-seconds 120 \
            --query "Command.CommandId" \
            --output text)

          echo "Nginx Command: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: "Wait for Nginx deploy"
        run: |
          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.nginx_deploy.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_WEB_OD_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: Status = $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Nginx deploy succeeded!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ Nginx deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "${{ steps.nginx_deploy.outputs.command_id }}" \
                --instance-id "${{ secrets.EC2_WEB_OD_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi

            sleep 10
          done
          echo "❌ Nginx deploy timed out"
          exit 1
